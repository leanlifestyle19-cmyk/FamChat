<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FamChat</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    /* ================================================================
       DESIGN TOKENS
    ================================================================ */
    :root {
      --bg:              #0e1117;
      --surface:         #161d2b;
      --surface-raised:  #1e2a3d;
      --border:          #263348;
      --bubble-other:    #1e2a3d;
      --bubble-other-tx: #dde4ed;
      --input-bg:        #161d2b;
      --input-border:    #2a3a52;
      --compose-bg:      #0e1117;
      --tx-primary:      #eef2f7;
      --tx-secondary:    #8a9bb0;
      --tx-muted:        #4e6078;
      --online:          #22c55e;
      --unread-bg:       #ef4444;
      --rx-bg:           rgba(255,255,255,0.07);
      --rx-own-bg:       rgba(255,255,255,0.18);
      --rx-border:       rgba(255,255,255,0.12);
      --safe-b:          env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--tx-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 15px; line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ================================================================
       SCREEN SYSTEM
    ================================================================ */
    .screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      background: var(--bg);
    }
    .screen.active { display: flex; }
    .screen.centered { align-items: center; justify-content: center; overflow-y: auto; padding: 28px 24px; }

    /* ================================================================
       SHARED COMPONENTS
    ================================================================ */
    .btn-primary {
      background: #3b82f6; color: #fff; border: none; border-radius: 12px;
      padding: 14px 20px; font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; width: 100%; transition: opacity .18s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .text-input {
      background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; color: var(--tx-primary); font-size: 15px; font-family: inherit;
      outline: none; width: 100%; transition: border-color .18s;
    }
    .text-input:focus { border-color: #3b82f6; }

    .form-label {
      display: block; font-size: 12px; font-weight: 600; letter-spacing: .4px;
      color: var(--tx-secondary); text-transform: uppercase; margin-bottom: 8px;
    }

    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: transparent; border: none; color: var(--tx-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .14s, color .14s;
    }
    .icon-btn:hover { background: var(--surface-raised); color: var(--tx-primary); }

    /* AVATAR CIRCLES — color set inline via JS hexToRgba() */
    .av {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; line-height: 1;
    }
    .av.grp {
      background: linear-gradient(135deg, rgba(59,130,246,.18), rgba(168,85,247,.18));
      border: 1.5px solid rgba(59,130,246,.38);
    }
    .av.bub { align-self: flex-end; margin-bottom: 2px; }

    /* EMOJI / COLOR PICKERS */
    .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; }
    .emoji-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 22px; border-radius: 10px; background: var(--surface);
      border: 2px solid transparent; cursor: pointer;
      transition: background .13s, border-color .13s, transform .1s;
      user-select: none;
    }
    .emoji-cell:hover { background: var(--surface-raised); }
    .emoji-cell:active { transform: scale(.88); }
    .emoji-cell.sel { border-color: #3b82f6; background: rgba(59,130,246,.14); }

    .color-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .color-dot {
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; outline: 3px solid transparent; outline-offset: 2px;
      transition: transform .14s, outline-color .14s;
      flex-shrink: 0;
    }
    .color-dot:hover { transform: scale(1.1); }
    .color-dot.sel { transform: scale(1.12); outline-color: rgba(255,255,255,.55); }

    /* ================================================================
       SCREEN 1 — FIREBASE SETUP
    ================================================================ */
    .setup-box { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 18px; }

    .app-logo { text-align: center; padding-bottom: 4px; }
    .app-icon-shell {
      width: 80px; height: 80px; border-radius: 22px; margin: 0 auto 14px;
      background: linear-gradient(135deg, #3b82f6 0%, #14b8a6 100%);
      display: flex; align-items: center; justify-content: center; font-size: 38px;
    }
    .app-name { font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
    .setup-sub { color: var(--tx-secondary); font-size: 14px; margin-top: 5px; }

    .setup-ta {
      width: 100%; min-height: 148px;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 13px; color: var(--tx-primary);
      font-family: 'Courier New', Courier, monospace; font-size: 12px;
      resize: vertical; outline: none; transition: border-color .18s; line-height: 1.6;
    }
    .setup-ta:focus { border-color: #3b82f6; }
    .setup-ta::placeholder { color: var(--tx-muted); }

    .err-msg { color: #f87171; font-size: 13px; min-height: 16px; text-align: center; }
    .readme-link {
      color: #3b82f6; font-size: 13px; text-align: center; text-decoration: none; cursor: pointer;
    }
    .readme-link:hover { text-decoration: underline; }

    /* ================================================================
       SCREEN 2 — PROFILE SETUP
    ================================================================ */
    .profile-box { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 20px; }
    .profile-heading { font-size: 26px; font-weight: 700; text-align: center; letter-spacing: -.3px; }

    /* ================================================================
       SCREEN 3 — HOME
    ================================================================ */
    .app-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 18px 13px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .app-hdr-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }

    .home-list { flex: 1; overflow-y: auto; }
    .chat-row {
      display: flex; align-items: center; gap: 14px; padding: 13px 18px;
      cursor: pointer; border-bottom: 1px solid rgba(38,51,72,.5);
      transition: background .12s;
    }
    .chat-row:hover { background: var(--surface); }
    .chat-row:active { background: var(--surface-raised); }
    .row-content { flex: 1; min-width: 0; }
    .row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .row-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { font-size: 12px; color: var(--tx-muted); flex-shrink: 0; }
    .row-bot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 3px; }
    .row-prev { font-size: 13px; color: var(--tx-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prev-name { color: var(--tx-muted); }
    .badge {
      background: var(--unread-bg); color: #fff; font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px; border-radius: 10px; padding: 0 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ================================================================
       SCREEN 4 — CHAT
    ================================================================ */
    .chat-hdr {
      display: flex; align-items: center; gap: 10px; padding: 11px 13px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-hdr-info { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .chat-hdr-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-hdr-sub { font-size: 12px; color: var(--tx-secondary); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
    .online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--online); flex-shrink: 0; }

    .chat-body { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

    .messages {
      flex: 1; overflow-y: auto; padding: 10px 13px 6px;
      display: flex; flex-direction: column; gap: 2px;
    }

    /* Date dividers */
    .date-div { display: flex; align-items: center; gap: 10px; margin: 10px 0 6px; }
    .date-div::before, .date-div::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .date-div span { font-size: 11.5px; color: var(--tx-muted); white-space: nowrap; padding: 0 2px; }

    /* Message rows */
    .msg-row { display: flex; align-items: flex-end; gap: 6px; }
    .msg-row.own { flex-direction: row-reverse; }
    .msg-grp { display: flex; flex-direction: column; max-width: 74%; }
    .msg-grp.own { align-items: flex-end; }
    .msg-grp.other { align-items: flex-start; }

    .sndr-name { font-size: 11.5px; color: var(--tx-secondary); margin-bottom: 3px; padding-left: 2px; }
    .msg-ts { font-size: 11px; color: var(--tx-muted); margin-bottom: 3px; align-self: center; }

    /* Bubbles — "tail-less tail" via corner radius difference */
    .bub {
      padding: 9px 13px; border-radius: 18px;
      font-size: 14px; line-height: 1.48; word-break: break-word;
      cursor: default; user-select: text; -webkit-user-select: text;
      transition: filter .1s;
    }
    .bub:active { filter: brightness(.92); }
    .bub.own { color: #fff; }
    .bub.own.last  { border-bottom-right-radius: 4px; }
    .bub.other { background: var(--bubble-other); color: var(--bubble-other-tx); }
    .bub.other.last { border-bottom-left-radius: 4px; }

    .av-spacer { width: 30px; flex-shrink: 0; }

    /* Reactions */
    .rxns { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .rxn-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 12px;
      background: var(--rx-bg); border: 1px solid var(--rx-border);
      font-size: 13px; cursor: pointer; transition: background .12s;
    }
    .rxn-chip.mine { background: var(--rx-own-bg); border-color: rgba(255,255,255,.22); }
    .rxn-chip:hover { background: rgba(255,255,255,.13); }

    /* Typing indicator */
    .typing-bar {
      display: none; align-items: center; gap: 6px;
      padding: 4px 14px 3px; font-size: 13px; color: var(--tx-secondary);
    }
    .typing-dots { display: inline-flex; gap: 2px; align-items: center; }
    .typing-dots span { animation: tdot 1.4s infinite; font-size: 17px; line-height: 1; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%, 60%, 100% { opacity: .28; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-2px); }
    }

    /* Compose bar — signature glow set inline from member color */
    .compose-area {
      border-top: 1px solid var(--border); background: var(--compose-bg);
      padding: 8px 11px; padding-bottom: calc(8px + var(--safe-b)); flex-shrink: 0;
    }
    .compose-bar {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--input-bg); border: 1.5px solid var(--input-border);
      border-radius: 26px; padding: 8px 8px 8px 15px;
      transition: border-color .18s;
    }
    .compose-ta {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--tx-primary); font-size: 15px; font-family: inherit; resize: none;
      min-height: 24px; max-height: 96px; line-height: 1.5; overflow-y: auto;
    }
    .compose-ta::placeholder { color: var(--tx-muted); }
    .compose-ta:disabled { opacity: .45; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%; background: #3b82f6;
      border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: transform .1s, opacity .16s;
    }
    .send-btn:hover { opacity: .9; }
    .send-btn:active { transform: scale(.88); }

    /* New message chip */
    .new-chip {
      display: none; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #3b82f6; color: #fff; padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer; z-index: 10;
      box-shadow: 0 4px 18px rgba(0,0,0,.45); white-space: nowrap;
    }

    /* Empty state */
    .empty-chat { text-align: center; color: var(--tx-muted); padding: 48px 16px; font-size: 14px; line-height: 1.7; }

    /* ================================================================
       SCREEN 5 — SETTINGS
    ================================================================ */
    .settings-hdr {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .settings-title { font-size: 17px; font-weight: 600; }

    .settings-body {
      flex: 1; overflow-y: auto; padding: 22px 18px;
      display: flex; flex-direction: column; gap: 28px;
    }
    .sec-label {
      font-size: 11.5px; font-weight: 700; letter-spacing: .7px;
      color: var(--tx-secondary); text-transform: uppercase; margin-bottom: 12px;
    }

    .member-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-name { font-weight: 500; color: var(--tx-primary); font-size: 14px; }
    .member-last { font-size: 12px; color: var(--tx-muted); margin-top: 1px; }
    .you-tag { color: var(--tx-muted); font-weight: 400; font-size: 13px; }

    .btn-ghost {
      background: var(--surface-raised); color: var(--tx-primary); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; width: 100%; text-align: left; transition: background .12s;
      display: block; margin-bottom: 10px;
    }
    .btn-ghost:hover { background: var(--border); }
    .btn-ghost:last-child { margin-bottom: 0; }
    .btn-danger {
      background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; width: 100%; text-align: left; transition: background .12s;
    }
    .btn-danger:hover { background: rgba(239,68,68,.2); }
    .ver-str { font-size: 12px; color: var(--tx-muted); text-align: center; }

    /* ================================================================
       OFFLINE BANNER
    ================================================================ */
    #offline-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #1a2438; border-bottom: 1px solid var(--border);
      padding: 7px 16px; display: none; align-items: center;
      justify-content: center; gap: 8px; font-size: 13px; color: var(--tx-secondary);
    }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pls 2s infinite; }
    @keyframes pls { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ================================================================
       REACTION PICKER
    ================================================================ */
    .rxn-picker {
      position: fixed; background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 38px; padding: 7px 10px; display: flex; gap: 3px;
      z-index: 1000; box-shadow: 0 10px 36px rgba(0,0,0,.6);
    }
    .rxn-btn {
      font-size: 24px; background: transparent; border: none; cursor: pointer;
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, transform .12s;
    }
    .rxn-btn:hover { background: var(--border); transform: scale(1.22); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>

  <!-- Firebase SDK (compat v10.12.0) — load before app script -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- ═══════════════════════════════════════════════════════
       SCREEN 1 · Firebase Setup
  ═══════════════════════════════════════════════════════ -->
  <div id="s-firebase" class="screen centered">
    <div class="setup-box">
      <div class="app-logo">
        <div class="app-icon-shell">💬</div>
        <div class="app-name">FamChat</div>
        <div class="setup-sub">Paste your Firebase config to get started</div>
      </div>
      <textarea id="fc-ta" class="setup-ta"
        placeholder='{&#10;  "apiKey": "AIzaSy...",&#10;  "authDomain": "your-app.firebaseapp.com",&#10;  "databaseURL": "https://your-app-default-rtdb.firebaseio.com",&#10;  "projectId": "your-app",&#10;  "storageBucket": "your-app.appspot.com",&#10;  "messagingSenderId": "123456789012",&#10;  "appId": "1:123456789012:web:abc123def456"&#10;}'></textarea>
      <button id="fc-btn" class="btn-primary">Connect &amp; Save</button>
      <div id="fc-err" class="err-msg"></div>
      <a class="readme-link" href="./README.md" target="_blank">How to get your Firebase config →</a>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCREEN 2 · Profile Setup
  ═══════════════════════════════════════════════════════ -->
  <div id="s-profile" class="screen centered">
    <div class="profile-box">
      <h2 class="profile-heading">Who are you?</h2>
      <div>
        <label class="form-label" for="p-name">Your name</label>
        <input id="p-name" class="text-input" type="text" placeholder="e.g. Mum" maxlength="20" autocomplete="off" autocorrect="off">
      </div>
      <div>
        <label class="form-label">Choose an emoji</label>
        <div id="p-emoji" class="emoji-grid"></div>
      </div>
      <div>
        <label class="form-label">Pick your colour</label>
        <div id="p-color" class="color-row"></div>
      </div>
      <button id="p-go" class="btn-primary" disabled>Let's go →</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCREEN 3 · Home
  ═══════════════════════════════════════════════════════ -->
  <div id="s-home" class="screen">
    <header class="app-hdr">
      <span class="app-hdr-title">FamChat</span>
      <button id="home-gear" class="icon-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div id="home-list" class="home-list"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCREEN 4 · Chat
  ═══════════════════════════════════════════════════════ -->
  <div id="s-chat" class="screen">
    <header class="chat-hdr">
      <button class="icon-btn" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <div id="chat-hdr-info" class="chat-hdr-info"></div>
    </header>
    <div class="chat-body">
      <div id="messages" class="messages"></div>
      <div id="new-chip" class="new-chip" onclick="scrollToBottom(false)"></div>
    </div>
    <div id="typing-bar" class="typing-bar"></div>
    <div class="compose-area">
      <div id="compose-bar" class="compose-bar">
        <textarea id="compose-ta" class="compose-ta" placeholder="Message…" rows="1"></textarea>
        <button id="send-btn" class="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCREEN 5 · Settings
  ═══════════════════════════════════════════════════════ -->
  <div id="s-settings" class="screen">
    <header class="settings-hdr">
      <button id="s-back" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <span class="settings-title">Settings</span>
    </header>
    <div class="settings-body">
      <div>
        <div class="sec-label">Your Profile</div>
        <div style="margin-bottom:12px">
          <label class="form-label" for="s-name">Display name</label>
          <input id="s-name" class="text-input" type="text" maxlength="20" autocorrect="off">
        </div>
        <div style="margin-bottom:12px">
          <label class="form-label">Emoji</label>
          <div id="s-emoji" class="emoji-grid"></div>
        </div>
        <div style="margin-bottom:18px">
          <label class="form-label">Colour</label>
          <div id="s-color" class="color-row"></div>
        </div>
        <button id="s-save" class="btn-primary">Save changes</button>
      </div>
      <div>
        <div class="sec-label">Family Members</div>
        <div id="s-members"></div>
      </div>
      <div>
        <div class="sec-label">Data</div>
        <button id="s-clear" class="btn-ghost">Clear local cache</button>
        <button id="s-reset" class="btn-danger">Reset app</button>
      </div>
      <div class="ver-str">FamChat v1.0</div>
    </div>
  </div>

  <!-- Offline banner -->
  <div id="offline-banner"><div class="pulse"></div>Reconnecting…</div>

  <script>
    // ══════════════════════════════════════════════════════════════════
    // SERVICE WORKER — registered first, before any async code
    // ══════════════════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
    }

    // ══════════════════════════════════════════════════════════════════
    // CONSTANTS
    // ══════════════════════════════════════════════════════════════════
    const EMOJIS = ['😀','😎','🤩','😄','🥳','🐯','🦁','🐼','🐸','🦊','🦋','🌟','⚡','🎮','🎯','🏆','🎸','🍀','🔥','💫','🌈','🦄','🧸','🎀'];
    const COLORS = [
      {hex:'#3b82f6'},{hex:'#22c55e'},{hex:'#f97316'},
      {hex:'#a855f7'},{hex:'#ec4899'},{hex:'#14b8a6'}
    ];
    const RXN_EMOJIS = ['❤️','👍','😂','😮','😢','🔥'];
    const DB_NAME = 'famchat-db';
    const DB_VER = 1;
    const MAX_MSGS = 50;
    const TYPING_MS = 3000;

    // ══════════════════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════════════════
    function uuid() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
    }

    function localDateStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function today() { return localDateStr(new Date()); }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtTime(ts) {
      const d = new Date(ts), now = new Date();
      const t = d.toLocaleTimeString('en-SG', {hour:'numeric', minute:'2-digit', hour12:true});
      const ds = localDateStr(d);
      if (ds === today()) return t;
      const yd = new Date(now); yd.setDate(yd.getDate()-1);
      if (ds === localDateStr(yd)) return `Yesterday ${t}`;
      if (d.getFullYear() === now.getFullYear()) {
        return `${d.toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short'})} · ${t}`;
      }
      return `${d.getDate()} ${d.toLocaleString('en-SG',{month:'short'})} ${d.getFullYear()} · ${t}`;
    }

    function fmtDivider(ts) {
      const d = new Date(ts), ds = localDateStr(d);
      if (ds === today()) return 'Today';
      const yd = new Date(); yd.setDate(yd.getDate()-1);
      if (ds === localDateStr(yd)) return 'Yesterday';
      return d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    }

    function mkDmId(a, b) { return [a,b].sort().join('--'); }

    function avHtml(emoji, color, size) {
      const sz = size==='sm'?36 : size==='bub'?30 : 46;
      const fs = size==='sm'?17 : size==='bub'?14 : 22;
      const cls = `av${size==='bub'?' bub':size==='sm'?' sm':''}`;
      return `<div class="${cls}" style="width:${sz}px;height:${sz}px;font-size:${fs}px;background:${hexToRgba(color,.2)};border:1.5px solid ${color}">${emoji}</div>`;
    }

    // ══════════════════════════════════════════════════════════════════
    // APP STATE
    // ══════════════════════════════════════════════════════════════════
    let db = null, fbDb = null, me = null;
    let members = {};
    let currentCh = null;   // {type, id, memberId}
    let currentMsgs = [];
    let lastMsgs = {};      // {channelId: {text, senderId, ts}}
    let unread = {};        // {channelId: n}
    let knownTs = {};       // {channelId: ts} — prevents false unread on first load
    let typingTimer = null;
    let typingActive = {};  // {memberId: true}
    let chatMsgOff = null, chatTypOff = null;
    let scrolledUp = false;
    let dmLsns = {};        // {dmId: offFn}
    let grpLsnActive = false;

    // ══════════════════════════════════════════════════════════════════
    // INDEXEDDB
    // ══════════════════════════════════════════════════════════════════
    function openDb() {
      return new Promise((res,rej) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onerror = () => rej(req.error);
        req.onsuccess = () => { db = req.result; res(db); };
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('messages')) {
            const ms = d.createObjectStore('messages', {keyPath:'id'});
            ms.createIndex('channelId','channelId',{unique:false});
            ms.createIndex('ts','ts',{unique:false});
          }
          if (!d.objectStoreNames.contains('members')) {
            d.createObjectStore('members', {keyPath:'id'});
          }
        };
      });
    }

    function idbPut(store, obj) {
      if (!db) return Promise.resolve();
      return new Promise((res,rej) => {
        const tx = db.transaction(store,'readwrite');
        const r = tx.objectStore(store).put(obj);
        r.onerror = () => rej(r.error);
        r.onsuccess = () => res();
      });
    }

    function idbAll(store) {
      if (!db) return Promise.resolve([]);
      return new Promise((res,rej) => {
        const tx = db.transaction(store,'readonly');
        const r = tx.objectStore(store).getAll();
        r.onerror = () => rej(r.error);
        r.onsuccess = () => res(r.result);
      });
    }

    function idbByIdx(store, idx, val) {
      if (!db) return Promise.resolve([]);
      return new Promise((res,rej) => {
        const tx = db.transaction(store,'readonly');
        const r = tx.objectStore(store).index(idx).getAll(val);
        r.onerror = () => rej(r.error);
        r.onsuccess = () => res(r.result);
      });
    }

    function idbClear(store) {
      if (!db) return Promise.resolve();
      return new Promise((res,rej) => {
        const tx = db.transaction(store,'readwrite');
        const r = tx.objectStore(store).clear();
        r.onerror = () => rej(r.error);
        r.onsuccess = () => res();
      });
    }

    function pruneOld() {
      if (!db) return;
      const cutoff = Date.now() - 30*24*60*60*1000;
      const tx = db.transaction('messages','readwrite');
      tx.objectStore('messages').index('ts').openCursor(IDBKeyRange.upperBound(cutoff)).onsuccess = e => {
        const c = e.target.result;
        if (c) { c.delete(); c.continue(); }
      };
    }

    // ══════════════════════════════════════════════════════════════════
    // FIREBASE INIT
    // ══════════════════════════════════════════════════════════════════
    async function initFb(cfg) {
      if (firebase.apps.length > 0) await firebase.app().delete();
      firebase.initializeApp(cfg);
      fbDb = firebase.database();
    }

    function testConn() {
      return new Promise((res,rej) => {
        const t = setTimeout(() => rej(new Error('Timed out after 8 seconds. Check your databaseURL.')), 8000);
        fbDb.ref('ping').set(Date.now()).then(() => { clearTimeout(t); res(); }).catch(e => { clearTimeout(t); rej(e); });
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN ROUTING
    // ══════════════════════════════════════════════════════════════════
    function showScreen(name) {
      ['firebase','profile','home','chat','settings'].forEach(s => {
        document.getElementById(`s-${s}`)?.classList.toggle('active', s===name);
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN 1 — FIREBASE SETUP
    // ══════════════════════════════════════════════════════════════════
    function initFirebaseScreen() {
      showScreen('firebase');
      const btn = document.getElementById('fc-btn');
      const ta  = document.getElementById('fc-ta');
      const err = document.getElementById('fc-err');

      btn.onclick = async () => {
        err.textContent = '';
        let cfg;
        try {
          const m = ta.value.trim().match(/{[\s\S]*}/);
          if (!m) throw new Error('No JSON object found');
          cfg = JSON.parse(m[0]);
        } catch(e) {
          err.textContent = 'Invalid JSON — paste just the config object starting with {';
          return;
        }
        if (!cfg.apiKey || !cfg.databaseURL) {
          err.textContent = 'Config must include apiKey and databaseURL';
          return;
        }
        btn.disabled = true; btn.textContent = 'Connecting…';
        try {
          await initFb(cfg);
          await testConn();
          localStorage.setItem('fc_firebase', JSON.stringify(cfg));
          initProfileScreen();
        } catch(e) {
          err.textContent = e.message;
          btn.disabled = false; btn.textContent = 'Connect & Save';
        }
      };
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN 2 — PROFILE SETUP
    // ══════════════════════════════════════════════════════════════════
    function buildPicker(gridEl, colorEl, selEmoji, selColor, onEmoji, onColor) {
      gridEl.innerHTML = '';
      EMOJIS.forEach(e => {
        const c = document.createElement('div');
        c.className = 'emoji-cell' + (e===selEmoji?' sel':'');
        c.textContent = e;
        c.onclick = () => {
          gridEl.querySelectorAll('.emoji-cell').forEach(x => x.classList.remove('sel'));
          c.classList.add('sel');
          onEmoji(e);
        };
        gridEl.appendChild(c);
      });
      colorEl.innerHTML = '';
      COLORS.forEach(cl => {
        const d = document.createElement('div');
        d.className = 'color-dot' + (cl.hex===selColor?' sel':'');
        d.style.background = cl.hex;
        d.onclick = () => {
          colorEl.querySelectorAll('.color-dot').forEach(x => x.classList.remove('sel'));
          d.classList.add('sel');
          onColor(cl.hex);
        };
        colorEl.appendChild(d);
      });
    }

    function initProfileScreen() {
      showScreen('profile');
      let selEmoji = null, selColor = null;
      const nameIn = document.getElementById('p-name');
      const goBtn  = document.getElementById('p-go');
      nameIn.value = '';
      nameIn.focus();

      buildPicker(
        document.getElementById('p-emoji'),
        document.getElementById('p-color'),
        null, null,
        e  => { selEmoji = e;     checkReady(); },
        cl => { selColor = cl;    checkReady(); }
      );

      function checkReady() { goBtn.disabled = !(nameIn.value.trim() && selEmoji && selColor); }
      nameIn.oninput = checkReady;

      goBtn.onclick = async () => {
        if (!nameIn.value.trim() || !selEmoji || !selColor) return;
        if ('Notification' in window) Notification.requestPermission().catch(()=>{});
        me = { id:uuid(), name:nameIn.value.trim().slice(0,20), emoji:selEmoji, color:selColor, createdAt:Date.now() };
        localStorage.setItem('fc_me', JSON.stringify(me));
        await fbDb.ref(`/members/${me.id}`).set({name:me.name, emoji:me.emoji, color:me.color, lastSeen:Date.now()});
        enterApp();
      };
    }

    // ══════════════════════════════════════════════════════════════════
    // APP ENTRY
    // ══════════════════════════════════════════════════════════════════
    async function enterApp() {
      try { const c = await idbAll('members'); c.forEach(m => { members[m.id] = m; }); } catch(e){}
      fbDb.ref(`/members/${me.id}/lastSeen`).set(Date.now()).catch(()=>{});
      setupConnectivity();
      listenMembers();
      initHomeScreen();
    }

    // ══════════════════════════════════════════════════════════════════
    // CONNECTIVITY MONITOR
    // ══════════════════════════════════════════════════════════════════
    function setupConnectivity() {
      const banner = document.getElementById('offline-banner');
      fbDb.ref('.info/connected').on('value', snap => {
        const on = !!snap.val();
        if (banner) banner.style.display = on ? 'none' : 'flex';
        const ta = document.getElementById('compose-ta');
        if (ta) { ta.disabled = !on; ta.placeholder = on ? 'Message…' : "You're offline"; }
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // MEMBERS LISTENER
    // ══════════════════════════════════════════════════════════════════
    function listenMembers() {
      fbDb.ref('/members').on('value', snap => {
        members = snap.val() || {};
        Object.entries(members).forEach(([id,m]) => idbPut('members',{id,...m}).catch(()=>{}));
        setupDmListeners();
        renderHomeList();
        if (currentCh?.type==='dm') renderChatHeader();
        renderSettingsMembers();
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN 3 — HOME
    // ══════════════════════════════════════════════════════════════════
    function initHomeScreen() {
      showScreen('home');
      currentCh = null;

      document.getElementById('home-gear').onclick = () => { showScreen('settings'); initSettingsScreen(); };

      if (!grpLsnActive) {
        grpLsnActive = true;
        fbDb.ref('/channels/group/lastMsg').on('value', snap => {
          const v = snap.val(); if (!v) return;
          const prev = knownTs['group'] || 0;
          if (prev > 0 && v.ts > prev && v.senderId !== me.id && (!currentCh || currentCh.id !== 'group'))
            unread['group'] = (unread['group']||0) + 1;
          knownTs['group'] = v.ts;
          lastMsgs['group'] = v;
          renderHomeList();
        });
      }

      setupDmListeners();
      renderHomeList();
    }

    function setupDmListeners() {
      if (!me) return;
      Object.keys(members).forEach(mid => {
        if (mid === me.id) return;
        const dId = mkDmId(me.id, mid);
        if (dmLsns[dId]) return;
        const ref = fbDb.ref(`/channels/dm/${dId}/lastMsg`);
        const fn = ref.on('value', snap => {
          const v = snap.val(); if (!v) return;
          const prev = knownTs[dId] || 0;
          if (prev > 0 && v.ts > prev && v.senderId !== me.id && (!currentCh || currentCh.id !== dId))
            unread[dId] = (unread[dId]||0) + 1;
          knownTs[dId] = v.ts;
          lastMsgs[dId] = v;
          renderHomeList();
        });
        dmLsns[dId] = () => ref.off('value', fn);
      });
    }

    function renderHomeList() {
      const el = document.getElementById('home-list');
      if (!el || !me) return;

      const gLast = lastMsgs['group'], gUr = unread['group']||0;
      const cnt = Object.keys(members).length;
      const others = Object.entries(members)
        .filter(([id]) => id !== me.id)
        .sort((a,b) => (lastMsgs[mkDmId(me.id,b[0])]?.ts||0) - (lastMsgs[mkDmId(me.id,a[0])]?.ts||0));

      let h = `
        <div class="chat-row" onclick="openChat('group',null)">
          <div class="av grp" style="width:46px;height:46px;font-size:24px">👨‍👩‍👧</div>
          <div class="row-content">
            <div class="row-top">
              <span class="row-name">Family</span>
              <span class="row-meta">${gLast ? fmtTime(gLast.ts) : ''}</span>
            </div>
            <div class="row-bot">
              <span class="row-prev">${gLast ? previewStr(gLast) : `<span style="color:var(--tx-muted)">${cnt} member${cnt!==1?'s':''}</span>`}</span>
              ${gUr>0 ? `<span class="badge">${gUr>99?'99+':gUr}</span>` : ''}
            </div>
          </div>
        </div>`;

      others.forEach(([mid,m]) => {
        const dId = mkDmId(me.id,mid), last = lastMsgs[dId], ur = unread[dId]||0;
        h += `
          <div class="chat-row" onclick="openChat('dm','${mid}')">
            ${avHtml(m.emoji, m.color)}
            <div class="row-content">
              <div class="row-top">
                <span class="row-name">${esc(m.name)}</span>
                <span class="row-meta">${last ? fmtTime(last.ts) : ''}</span>
              </div>
              <div class="row-bot">
                <span class="row-prev">${last ? previewStr(last) : `<span style="color:var(--tx-muted)">No messages yet</span>`}</span>
                ${ur>0 ? `<span class="badge">${ur>99?'99+':ur}</span>` : ''}
              </div>
            </div>
          </div>`;
      });

      el.innerHTML = h;
    }

    function previewStr(last) {
      const sn = last.senderId===me.id ? 'You' : (members[last.senderId]?.name||'?');
      return `<span class="prev-name">${esc(sn)}:</span> ${esc((last.text||'').slice(0,50))}`;
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN 4 — CHAT
    // ══════════════════════════════════════════════════════════════════
    function openChat(type, memberId) {
      const chId = type==='group' ? 'group' : mkDmId(me.id, memberId);
      currentCh = {type, id:chId, memberId};
      unread[chId] = 0;
      currentMsgs = [];
      scrolledUp = false;
      typingActive = {};

      if (chatMsgOff) { chatMsgOff(); chatMsgOff = null; }
      if (chatTypOff) { chatTypOff(); chatTypOff = null; }

      showScreen('chat');
      renderChatHeader();
      renderMsgs();
      initCompose();
      initScrollTrack();

      // Load IDB cache first for instant display
      idbByIdx('messages','channelId',chId).then(cached => {
        if (currentCh?.id !== chId) return;
        currentMsgs = cached.sort((a,b)=>a.ts-b.ts).slice(-MAX_MSGS);
        renderMsgs();
        scrollToBottom(true);
        attachMsgListener(chId, type);
      }).catch(() => attachMsgListener(chId, type));

      // Typing listener
      const tRef = fbDb.ref(`/typing/${chId}`);
      const tFn = tRef.on('value', snap => {
        const d = snap.val()||{};
        typingActive = {};
        Object.entries(d).forEach(([mid,info]) => {
          if (mid!==me.id && info.active && (Date.now()-info.ts)<5000) typingActive[mid]=true;
        });
        renderTypingBar();
      });
      chatTypOff = () => tRef.off('value', tFn);

      renderHomeList();
    }

    function attachMsgListener(chId, type) {
      const path = type==='group' ? '/channels/group/messages' : `/channels/dm/${chId}/messages`;
      const ref = fbDb.ref(path).limitToLast(MAX_MSGS);
      const fn = ref.on('value', snap => {
        if (currentCh?.id !== chId) return;
        const data = snap.val()||{};
        const msgs = Object.entries(data).map(([id,m])=>({id, channelId:chId, ...m})).sort((a,b)=>a.ts-b.ts);
        const prevLast = currentMsgs.length ? currentMsgs[currentMsgs.length-1].ts : 0;
        currentMsgs = msgs;
        renderMsgs();
        msgs.forEach(m => idbPut('messages',m).catch(()=>{}));
        const newOthers = msgs.filter(m => m.ts>prevLast && m.senderId!==me.id);
        const anyNew   = msgs.some(m => m.ts>prevLast);
        if (prevLast===0) {
          scrollToBottom(true);
        } else if (anyNew) {
          if (!scrolledUp) scrollToBottom(false);
          else if (newOthers.length>0) showChip(newOthers.length);
          newOthers.forEach(m => fireNotif(m, chId));
        }
      });
      chatMsgOff = () => ref.off('value', fn);
    }

    function renderChatHeader() {
      const el = document.getElementById('chat-hdr-info');
      if (!el || !currentCh) return;
      if (currentCh.type==='group') {
        const cnt = Object.keys(members).length;
        el.innerHTML = `
          <div class="av grp" style="width:36px;height:36px;font-size:20px">👨‍👩‍👧</div>
          <div>
            <div class="chat-hdr-name">Family</div>
            <div class="chat-hdr-sub">${cnt} member${cnt!==1?'s':''}</div>
          </div>`;
      } else {
        const m = members[currentCh.memberId]||{name:'Unknown',emoji:'?',color:'#3b82f6'};
        const isOn = m.lastSeen && (Date.now()-m.lastSeen<120000);
        el.innerHTML = `
          ${avHtml(m.emoji, m.color, 'sm')}
          <div>
            <div class="chat-hdr-name">${esc(m.name)}</div>
            <div class="chat-hdr-sub">${isOn ? '<span class="online-dot"></span>Online' : `last seen ${m.lastSeen?fmtTime(m.lastSeen):'a while ago'}`}</div>
          </div>`;
      }
    }

    function renderMsgs() {
      const el = document.getElementById('messages');
      if (!el) return;
      if (!currentMsgs.length) {
        el.innerHTML = '<div class="empty-chat">No messages yet.<br>Say hello! 👋</div>';
        return;
      }
      let h='', lastDate=null, lastSender=null, lastTs=null;
      currentMsgs.forEach((msg,i) => {
        const ds = localDateStr(new Date(msg.ts));
        if (ds!==lastDate) {
          h += `<div class="date-div"><span>${fmtDivider(msg.ts)}</span></div>`;
          lastDate=ds; lastSender=null;
        }
        const own   = msg.senderId===me.id;
        const sndr  = members[msg.senderId]||{name:'?',emoji:'❓',color:'#3b82f6'};
        const showAv = !own && msg.senderId!==lastSender;
        const showTs = !lastTs || (msg.ts-lastTs)>30*60*1000;
        const next   = currentMsgs[i+1];
        const isLast = !next || next.senderId!==msg.senderId;
        const rxHtml = buildRxns(msg.reactions||{}, msg.id);
        const col    = own ? (me.color||sndr.color) : null;
        const bubSt  = own ? `style="background:${col}"` : '';
        if (own) {
          h += `<div class="msg-row own">
            <div class="msg-grp own">
              ${showTs ? `<div class="msg-ts">${fmtTime(msg.ts)}</div>` : ''}
              <div class="bub own${isLast?' last':''}" ${bubSt}
                   oncontextmenu="showPicker(event,'${msg.id}');return false"
                   ontouchstart="tStart(event,'${msg.id}')" ontouchend="tEnd()"
                   data-mid="${msg.id}">
                ${esc(msg.text).replace(/\n/g,'<br>')}
              </div>
              ${rxHtml}
            </div>
          </div>`;
        } else {
          h += `<div class="msg-row other">
            ${showAv ? avHtml(sndr.emoji,sndr.color,'bub') : '<div class="av-spacer"></div>'}
            <div class="msg-grp other">
              ${showAv ? `<div class="sndr-name">${esc(sndr.name)}</div>` : ''}
              ${showTs ? `<div class="msg-ts">${fmtTime(msg.ts)}</div>` : ''}
              <div class="bub other${isLast?' last':''}"
                   oncontextmenu="showPicker(event,'${msg.id}');return false"
                   ontouchstart="tStart(event,'${msg.id}')" ontouchend="tEnd()"
                   data-mid="${msg.id}">
                ${esc(msg.text).replace(/\n/g,'<br>')}
              </div>
              ${rxHtml}
            </div>
          </div>`;
        }
        lastSender=msg.senderId; lastTs=msg.ts;
      });
      el.innerHTML = h;
    }

    function buildRxns(rxs, msgId) {
      if (!rxs||!Object.keys(rxs).length) return '';
      const grp={};
      Object.entries(rxs).forEach(([mid,em]) => { (grp[em]||(grp[em]=[])).push(mid); });
      const chips = Object.entries(grp).map(([em,mids]) => {
        const mine = mids.includes(me.id);
        return `<span class="rxn-chip${mine?' mine':''}" onclick="doRxn('${msgId}','${em}')">${em} ${mids.length}</span>`;
      });
      return `<div class="rxns">${chips.join('')}</div>`;
    }

    function renderTypingBar() {
      const el = document.getElementById('typing-bar');
      if (!el) return;
      const active = Object.keys(typingActive).filter(k=>typingActive[k]);
      if (!active.length) { el.style.display='none'; el.innerHTML=''; return; }
      const names = active.map(mid=>members[mid]?.name||'Someone').join(', ');
      el.style.display='flex';
      el.innerHTML=`${esc(names)} is typing<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>`;
    }

    // ── Compose bar ────────────────────────────────────────────────
    function initCompose() {
      const ta  = document.getElementById('compose-ta');
      const btn = document.getElementById('send-btn');
      const bar = document.getElementById('compose-bar');
      if (!ta||!btn||!bar) return;

      // Signature: personal glow from member's accent colour
      if (me) bar.style.boxShadow = `inset 0 0 0 1.5px ${hexToRgba(me.color,.18)}`;

      ta.value=''; ta.style.height='auto'; ta.focus();

      ta.oninput = () => {
        ta.style.height='auto';
        ta.style.height=Math.min(ta.scrollHeight,96)+'px';
        if (currentCh) {
          fbDb.ref(`/typing/${currentCh.id}/${me.id}`).set({active:true,ts:Date.now()}).catch(()=>{});
          clearTimeout(typingTimer);
          typingTimer = setTimeout(()=>{ fbDb.ref(`/typing/${currentCh.id}/${me.id}`).set({active:false,ts:Date.now()}).catch(()=>{}); }, TYPING_MS);
        }
      };

      ta.onkeydown = e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
      btn.onclick  = sendMsg;
    }

    async function sendMsg() {
      const ta = document.getElementById('compose-ta');
      if (!ta||!currentCh) return;
      const text = ta.value.trim(); if (!text) return;
      ta.value=''; ta.style.height='auto';
      clearTimeout(typingTimer);
      fbDb.ref(`/typing/${currentCh.id}/${me.id}`).set({active:false,ts:Date.now()}).catch(()=>{});
      const id=uuid(), ts=Date.now();
      const mPath = currentCh.type==='group' ? `/channels/group/messages/${id}` : `/channels/dm/${currentCh.id}/messages/${id}`;
      const lPath = currentCh.type==='group' ? '/channels/group/lastMsg' : `/channels/dm/${currentCh.id}/lastMsg`;
      try {
        await fbDb.ref(mPath).set({senderId:me.id, text, ts, reactions:{}});
        await fbDb.ref(lPath).set({text, senderId:me.id, ts});
        scrollToBottom(false);
      } catch(e) { ta.value=text; console.error('Send failed:',e); }
    }

    // ── Scroll ─────────────────────────────────────────────────────
    function initScrollTrack() {
      const el = document.getElementById('messages');
      if (!el) return;
      el.onscroll = () => {
        scrolledUp = (el.scrollHeight - el.scrollTop - el.clientHeight) > 200;
        if (!scrolledUp) hideChip();
      };
    }

    function scrollToBottom(instant) {
      const el = document.getElementById('messages');
      if (!el) return;
      scrolledUp=false; hideChip();
      if (instant) el.scrollTop=el.scrollHeight;
      else el.scrollTo({top:el.scrollHeight, behavior:'smooth'});
    }

    function showChip(n) {
      const c=document.getElementById('new-chip');
      if (c){c.style.display='block'; c.textContent=`↓ ${n} new message${n>1?'s':''}`;}
    }
    function hideChip() {
      const c=document.getElementById('new-chip'); if(c)c.style.display='none';
    }

    function goBack() {
      if (chatMsgOff){chatMsgOff();chatMsgOff=null;}
      if (chatTypOff){chatTypOff();chatTypOff=null;}
      clearTimeout(typingTimer);
      if (currentCh) fbDb.ref(`/typing/${currentCh.id}/${me.id}`).set({active:false,ts:Date.now()}).catch(()=>{});
      currentCh=null;
      showScreen('home');
      renderHomeList();
    }

    // ── Reactions ──────────────────────────────────────────────────
    let tpTimer=null;
    function tStart(e,msgId) {
      const x=e.touches?.[0]?.clientX||0, y=e.touches?.[0]?.clientY||0;
      tpTimer=setTimeout(()=>_picker(x,y,msgId),500);
    }
    function tEnd() { clearTimeout(tpTimer); }

    function showPicker(e,msgId) {
      e.preventDefault();
      _picker(e.clientX,e.clientY,msgId);
    }

    function _picker(x,y,msgId) {
      document.getElementById('rxn-picker')?.remove();
      const p=document.createElement('div'); p.id='rxn-picker'; p.className='rxn-picker';
      RXN_EMOJIS.forEach(em=>{
        const b=document.createElement('button'); b.className='rxn-btn'; b.textContent=em;
        b.onclick=()=>{ doRxn(msgId,em); p.remove(); };
        p.appendChild(b);
      });
      document.body.appendChild(p);
      requestAnimationFrame(()=>{
        const pw=p.offsetWidth||286;
        p.style.left=Math.max(8,Math.min(x-pw/2,window.innerWidth-pw-8))+'px';
        p.style.top=Math.max(8,y-64)+'px';
      });
      setTimeout(()=>document.addEventListener('click',()=>p.remove(),{once:true}),60);
    }

    async function doRxn(msgId,emoji) {
      if (!currentCh) return;
      const path = currentCh.type==='group'
        ? `/channels/group/messages/${msgId}/reactions/${me.id}`
        : `/channels/dm/${currentCh.id}/messages/${msgId}/reactions/${me.id}`;
      const msg = currentMsgs.find(m=>m.id===msgId);
      if (msg?.reactions?.[me.id]===emoji) await fbDb.ref(path).remove();
      else await fbDb.ref(path).set(emoji);
    }

    // ── Notifications ──────────────────────────────────────────────
    function fireNotif(msg, chId) {
      if (document.visibilityState==='visible') return;
      if (Notification.permission!=='granted') return;
      const sndr = members[msg.senderId]||{name:'Someone'};
      const title = currentCh?.type==='group' ? `Family · ${sndr.name}` : sndr.name;
      const n = new Notification(title,{body:msg.text.slice(0,80), icon:'./icon-192.png'});
      n.onclick=()=>{ window.focus(); };
    }

    // ══════════════════════════════════════════════════════════════════
    // SCREEN 5 — SETTINGS
    // ══════════════════════════════════════════════════════════════════
    function initSettingsScreen() {
      const nameIn = document.getElementById('s-name');
      nameIn.value = me.name;
      let selEmoji=me.emoji, selColor=me.color;

      buildPicker(
        document.getElementById('s-emoji'),
        document.getElementById('s-color'),
        me.emoji, me.color,
        e  => { selEmoji=e;  },
        cl => { selColor=cl; }
      );

      document.getElementById('s-back').onclick = () => showScreen('home');

      document.getElementById('s-save').onclick = async () => {
        const n = nameIn.value.trim().slice(0,20); if (!n) return;
        me.name=n; me.emoji=selEmoji; me.color=selColor;
        localStorage.setItem('fc_me', JSON.stringify(me));
        await fbDb.ref(`/members/${me.id}`).update({name:me.name, emoji:me.emoji, color:me.color});
        showScreen('home'); renderHomeList();
      };

      document.getElementById('s-clear').onclick = async () => {
        if (!confirm('Clear local cache? Messages re-sync from Firebase next time you open a chat.')) return;
        await idbClear('messages');
        alert('Cache cleared.');
      };

      document.getElementById('s-reset').onclick = () => {
        if (!confirm('Reset app? All local data will be cleared and you\'ll return to setup.')) return;
        localStorage.clear();
        indexedDB.deleteDatabase(DB_NAME);
        location.reload();
      };

      renderSettingsMembers();
    }

    function renderSettingsMembers() {
      const el = document.getElementById('s-members');
      if (!el||!me) return;
      el.innerHTML = Object.entries(members).map(([id,m]) => {
        const isSelf = id===me.id;
        return `<div class="member-row">
          ${avHtml(m.emoji, m.color, 'sm')}
          <div>
            <div class="member-name">${esc(m.name)}${isSelf?' <span class="you-tag">(you)</span>':''}</div>
            <div class="member-last">last seen ${m.lastSeen?fmtTime(m.lastSeen):'unknown'}</div>
          </div>
        </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════
    async function init() {
      try { await openDb(); pruneOld(); } catch(e) { console.warn('IDB open failed:', e); }

      const cfgStr = localStorage.getItem('fc_firebase');
      const meStr  = localStorage.getItem('fc_me');

      if (!cfgStr) { initFirebaseScreen(); return; }

      try {
        await initFb(JSON.parse(cfgStr));
      } catch(e) {
        localStorage.removeItem('fc_firebase');
        initFirebaseScreen(); return;
      }

      if (!meStr) { initProfileScreen(); return; }

      try { me = JSON.parse(meStr); }
      catch(e) { localStorage.removeItem('fc_me'); initProfileScreen(); return; }

      enterApp();
    }

    init();
  </script>
</body>
